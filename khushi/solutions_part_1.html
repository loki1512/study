<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solutions Part 1 — Quiz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<div id="sf-quiz">

  <div class="sf-header">
    <div class="sf-title">
      // Solutions Part 1 :: QUIZ INTERFACE
    </div>

    <div class="sf-score-display">
      <div class="sf-score-pill">
        <span>SCORE</span>

        <span class="val correct" id="hdr-correct">0</span>

        <span class="sep">/</span>

        <span class="val wrong" id="hdr-wrong">0</span>

        <span class="sep">|</span>

        <span class="val accuracy" id="hdr-acc">--%</span>
      </div>
    </div>
  </div>

  <div class="sf-progress-row">
    <div class="sf-progress-track" id="prog-track"></div>

    <div class="sf-progress-text" id="prog-text">
      Q 1 / 75
    </div>
  </div>

  <div class="sf-card" id="card-container">
    <!-- Dynamic content injected by JS -->
  </div>

</div>

<script src="../khushi/static/js/solutions_part_1.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</body>
</html>
