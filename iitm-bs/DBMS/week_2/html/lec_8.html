<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Foundations · Lecture Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/dbms.css">
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
    startup: { typeset: false }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div id="sf-quiz">
  <div class="sf-header">
    <div class="sf-title">▸ SQL FOUNDATIONS · TERMINAL QUIZ</div>
    <div class="sf-score-display">
      <div class="sf-score-pill">
        <span class="correct val" id="sc-correct">0</span>
        <span class="sep">/</span>
        <span class="val" id="sc-total">0</span>
        <span class="sep">|</span>
        <span class="accuracy" id="sc-acc">—%</span>
      </div>
    </div>
  </div>
  <div class="sf-progress-row">
    <div class="sf-progress-track"><div class="sf-progress-fill" id="sf-progress" style="width:0%"></div></div>
    <div class="sf-progress-text" id="sf-prog-text">0 / 50</div>
  </div>
  <div class="sf-card" id="sf-card"></div>
  <div class="sf-kb-bar" id="sf-kb-bar">
    <span><kbd class="sf-kb-key">1–4</kbd> Select option</span>
    <span><kbd class="sf-kb-key">Enter</kbd> Submit / Next</span>
    <span><kbd class="sf-kb-key">Tab</kbd> Navigate</span>
    <span><kbd class="sf-kb-key">Ctrl+Enter</kbd> Submit type-in</span>
  </div>
</div>

<!-- Table Modal (kept for structural parity; content shown when applicable) -->
<div class="sf-modal-backdrop" id="sf-modal-backdrop" role="dialog" aria-modal="true" aria-label="Reference Info">
  <div class="sf-modal">
    <div class="sf-modal-header">
      <span>▸ REFERENCE</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sf-modal-qnum" id="modal-qnum"></span>
        <button class="sf-modal-close" id="btn-modal-close" tabindex="0">✕ CLOSE</button>
      </div>
    </div>
    <div class="sf-modal-body" id="modal-body"></div>
  </div>
</div>

<script src="../js/lec_8.js"></script>
</body>
</html>
